name: Build CueVue DMG Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-dmg:
    name: Build signed notarized macOS DMG
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean previous build output
        run: rm -rf dist

      - name: Verify signing and notarization secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CSC_LINK"
          test -n "$CSC_KEY_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"

      - name: Read package version
        id: pkg
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "dmg=dist/CueVue-${version}-arm64.dmg" >> "$GITHUB_OUTPUT"

      - name: Build signed notarized Apple Silicon DMG
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build:dmg

      - name: Verify DMG output
        shell: bash
        run: |
          set -euo pipefail
          dmg="${{ steps.pkg.outputs.dmg }}"
          ls -lah dist/
          test -f "$dmg"
          test -s "$dmg"
          ls -lh "$dmg"

      - name: Upload workflow artifact backup
        uses: actions/upload-artifact@v4
        with:
          name: CueVue-${{ steps.pkg.outputs.version }}-arm64-dmg
          path: ${{ steps.pkg.outputs.dmg }}
          if-no-files-found: error

      - name: Publish GitHub Release asset
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.pkg.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: CueVue Beta ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || steps.pkg.outputs.tag }}
          draft: false
          prerelease: true
          make_latest: true
          fail_on_unmatched_files: true
          files: ${{ steps.pkg.outputs.dmg }}
