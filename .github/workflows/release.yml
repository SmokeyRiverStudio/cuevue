name: Build CueVue DMG Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos-dmg:
    name: Build unsigned macOS DMG
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build unsigned Apple Silicon DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:dmg

      - name: Verify DMG output
        run: ls -lh dist/CueVue-*.dmg

      - name: Upload DMG workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CueVue-macOS-DMG
          path: dist/CueVue-*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: CueVue Beta ${{ github.ref_name }}
          draft: false
          prerelease: true
          files: dist/CueVue-*.dmg
